<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Gravitacional</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<style>
body{
    margin:0;
    background:linear-gradient(180deg,#0a0f1c,#081225);
    font-family:Arial;
    color:white;
}

header{
    text-align:center;
    padding:15px;
    font-size:22px;
    background:#111827;
}

/* ===== FORMULARIO ===== */
.panel{
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:18px;
    background:#0f172a;
    max-width:500px;
    margin:20px auto;
    border-radius:15px;
}

.grupo{
    display:flex;
    flex-direction:column;
    gap:6px;
}

.grupo label{
    font-size:14px;
    font-weight:bold;
    color:#8bdcff;
}

.grupo input,
.grupo select{
    padding:10px;
    border-radius:8px;
    border:none;
    background:#1e293b;
    color:white;
}

.botones{
    display:flex;
    gap:10px;
}

.botones button{
    flex:1;
    padding:10px;
    border:none;
    border-radius:8px;
    background:linear-gradient(90deg,#00eaff,#0077ff);
    font-weight:bold;
    cursor:pointer;
}

/* ===== RESULTADO ===== */
.resultado{
    text-align:center;
    font-size:28px;
    margin:15px;
    color:#00eaff;
}

/* ===== GRAFICAS ===== */
.graficas-container{
    display:flex;
    gap:20px;
    padding:20px;
}

.grafica-box{
    flex:1;
    height:300px;   /* 🔥 ALTURA FIJA */
    background:#111827;
    border-radius:12px;
    display:flex;
    flex-direction:column;
    position:relative;
}

.titulo-grafica{
    text-align:center;
    padding:8px;
    font-weight:bold;
    background:linear-gradient(90deg,#00eaff,#0077ff);
}

.expandir{
    position:absolute;
    top:8px;
    right:8px;
    background:#00eaff;
    border:none;
    padding:5px 8px;
    border-radius:6px;
    cursor:pointer;
    font-size:12px;
    font-weight:bold;
}

#grafica{
    height:100% !important;
    width:100% !important;
}

canvas,#threeContainer{
    flex:1;
}

.divisor{
    width:3px;
    background:linear-gradient(#00eaff,#0077ff);
}

/* ===== MODAL EXPANSION ===== */
.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    z-index:1000;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.modal-content{
    width:95%;
    height:85%;
    background:#111827;
    border-radius:12px;
    display:flex;
    flex-direction:column;
}

.cerrar{
    background:red;
    border:none;
    color:white;
    padding:6px 10px;
    margin:10px;
    border-radius:6px;
    cursor:pointer;
}

.modal canvas,
.modal #threeContainerExpandido{
    flex:1;
}

/* ===== MOVIL ===== */
@media(max-width:768px){
    .graficas-container{
        flex-direction:column;
    }
    .divisor{
        display:none;
    }
}
</style>
</head>
<body>

<header>Simulador Gravitacional</header>

<div class="panel">

<div class="grupo">
<label>Densidad ρ (kg/m³)</label>
<input id="densidad" type="number">
</div>

<div class="grupo">
<label>Radio R (m)</label>
<input id="radio" type="number">
</div>

<div class="grupo">
<label>Distancia r (m)</label>
<input id="r" type="number">
</div>

<div class="grupo">
<label>r_max (m)</label>
<input id="rmax" type="number" value="100000000">
</div>

<div class="grupo">
<label>Modo</label>
<select id="modo">
<option>Potencial</option>
<option>Gravedad</option>
</select>
</div>

<div class="grupo">
<label>Velocidad</label>
<input id="velocidad" type="range" min="0.001" max="0.05" step="0.001" value="0.01">
</div>

<div class="botones">
<button onclick="usarTierra()">Tierra</button>
<button onclick="calcular()">Calcular</button>
<button onclick="toggleAnim()">Animar</button>
</div>

</div>

<div class="resultado" id="resultadoBox">
Resultado aparecerá aquí
</div>

<div class="graficas-container">

<div class="grafica-box">
<div class="titulo-grafica">Gráfica 2D</div>
<button class="expandir" onclick="expandir2D()">⛶</button>
<canvas id="grafica"></canvas>
</div>

<div class="divisor"></div>

<div class="grafica-box">
<div class="titulo-grafica">Visualización 3D</div>
<button class="expandir" onclick="expandir3D()">⛶</button>
<div id="threeContainer"></div>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<button class="cerrar" onclick="cerrarModal()">Cerrar</button>
<div class="modal-content" id="modalContenido"></div>
</div>

<script>

const G=6.674e-11;
let chart;
let scene,camera,renderer,sphere,punto,controls;
let parametros=null;
let animando=false;
let angulo=0;

function usarTierra(){
densidad.value=5515;
radio.value=6378137;
}

function masaTotal(rho,R){
return (4/3)*Math.PI*Math.pow(R,3)*rho;
}

function valorFisico(r,rho,R){
let M=masaTotal(rho,R);
if(modo.value==="Gravedad"){
if(r<=R) return (4/3)*Math.PI*G*rho*r;
return G*M/(r*r);
}else{
if(r<=R) return -(2/3)*Math.PI*G*rho*(3*R*R-r*r);
return -G*M/r;
}
}

function calcular(){
let rho=parseFloat(densidad.value);
let R=parseFloat(radio.value);
let r_val=parseFloat(r.value);
let r_max=parseFloat(rmax.value);
if(!rho||!R||!r_val||!r_max){alert("Completa los valores");return;}
parametros={rho,R,r:r_val,r_max};
actualizarResultado(r_val);
generarGrafica();
crearEscena3D();
}

function actualizarResultado(r_actual){
let {rho,R}=parametros;
let resultado=valorFisico(r_actual,rho,R);
resultadoBox.innerHTML=
(modo.value==="Gravedad"?"g(r) = ":"V(r) = ")
+resultado.toExponential(5);
}

function generarGrafica(){
let {rho,R,r,r_max}=parametros;
let datos=[],valores=[];
for(let i=0;i<=500;i++){
let x=i*(r_max)/500;
datos.push(x);
valores.push(valorFisico(x,rho,R));
}
if(chart) chart.destroy();

chart=new Chart(grafica,{
type:"line",
data:{
datasets:[
{
data:datos.map((x,i)=>({x:x,y:valores[i]})),
borderColor:"#00eaff",
borderWidth:2,
pointRadius:0
},
{
type:"scatter",
data:[{x:r,y:valorFisico(r,rho,R)}],
backgroundColor:"red",
pointRadius:6
}]
},
options:{
responsive:false,
maintainAspectRatio:false,
animation:false,
scales:{
x:{type:"linear",max:r_max},
y:{
min:Math.min(...valores),
max:Math.max(...valores)
}
},
plugins:{legend:{display:false}}
}
});
}

function crearEscena3D(){
let {rho,R,r_max}=parametros;
threeContainer.innerHTML="";
scene=new THREE.Scene();
camera=new THREE.PerspectiveCamera(60,1,0.1,1000);
renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(300,250);
renderer.setPixelRatio(1);
threeContainer.appendChild(renderer.domElement);
controls=new THREE.OrbitControls(camera,renderer.domElement);

let light=new THREE.PointLight(0xffffff,1.5);
light.position.set(10,10,10);
scene.add(light);

sphere=new THREE.Mesh(
new THREE.SphereGeometry(3,64,64),
new THREE.MeshPhongMaterial({color:0x0077ff})
);
scene.add(sphere);

camera.position.set(8,6,8);

function render(){
requestAnimationFrame(render);
sphere.rotation.y+=0.003;
renderer.render(scene,camera);
}
render();
}

function toggleAnim(){animando=!animando;}

/* ===== EXPANDIR ===== */
function expandir2D(){
modal.style.display="flex";
modalContenido.innerHTML="";
let nuevoCanvas=document.createElement("canvas");
nuevoCanvas.style.height="100%";
nuevoCanvas.style.width="100%";
modalContenido.appendChild(nuevoCanvas);
new Chart(nuevoCanvas,chart.config);
}

function expandir3D(){
modal.style.display="flex";
modalContenido.innerHTML="";
let cont=document.createElement("div");
cont.id="threeContainerExpandido";
cont.style.flex="1";
modalContenido.appendChild(cont);

let escena=new THREE.Scene();
let cam=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,1000);
let rend=new THREE.WebGLRenderer({antialias:true});
rend.setSize(window.innerWidth*0.9,window.innerHeight*0.7);
cont.appendChild(rend.domElement);

let luz=new THREE.PointLight(0xffffff,1.5);
luz.position.set(10,10,10);
escena.add(luz);

let esfera=new THREE.Mesh(
new THREE.SphereGeometry(3,64,64),
new THREE.MeshPhongMaterial({color:0x00eaff})
);
escena.add(esfera);

cam.position.set(8,6,8);

function anim(){
requestAnimationFrame(anim);
esfera.rotation.y+=0.003;
rend.render(escena,cam);
}
anim();
}

function cerrarModal(){
modal.style.display="none";
modalContenido.innerHTML="";
}

</script>
</body>
</html>
