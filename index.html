<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Gravitacional</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<style>
body{
    margin:0;
    background:linear-gradient(180deg,#0a0f1c,#081225);
    font-family:Arial;
    color:white;
}

header{
    text-align:center;
    padding:15px;
    font-size:22px;
    background:#111827;
}

/* ====== FORMULARIO (DESKTOP ORIGINAL) ====== */
.panel{
    padding:20px;
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    background:#0f172a;
    justify-content:center;
}

.panel input,
.panel select{
    padding:6px;
    border-radius:6px;
    border:none;
    background:#1e293b;
    color:white;
}

.panel button{
    padding:6px 10px;
    border:none;
    border-radius:6px;
    background:linear-gradient(90deg,#00eaff,#0077ff);
    font-weight:bold;
    cursor:pointer;
}

.resultado{
    text-align:center;
    font-size:22px;
    margin:10px;
    color:#00eaff;
}

/* ====== GRAFICAS DESKTOP (ORIGINAL LADO A LADO) ====== */
.graficas-container{
    display:flex;
    gap:20px;
    padding:20px;
}

.grafica-box{
    flex:1;
    height:350px;
    background:#111827;
    border-radius:12px;
    display:flex;
    flex-direction:column;
    position:relative;
}

.titulo-grafica{
    text-align:center;
    padding:6px;
    font-weight:bold;
    background:linear-gradient(90deg,#00eaff,#0077ff);
}

canvas,#threeContainer{
    flex:1;
}

.divisor{
    width:3px;
    background:linear-gradient(#00eaff,#0077ff);
}

/* ====== BOTON VOLVER (SOLO MOVIL) ====== */
#volverBtn{
    display:none;
    margin:10px auto;
    padding:8px 14px;
    background:#ff4444;
    border:none;
    border-radius:8px;
    color:white;
    font-weight:bold;
}

/* ================= MOBILE ================= */
@media(max-width:768px){

    .graficas-container{
        flex-direction:column;
        display:none;   /* 🔥 ocultas al inicio */
    }

    .divisor{
        display:none;
    }

    .grafica-box{
        height:300px;   /* 🔥 altura fija */
    }

    .resultado{
        display:none;   /* oculto hasta calcular */
    }

    #volverBtn{
        display:block;
    }
}
</style>
</head>
<body>

<header>Simulador Gravitacional</header>

<div class="panel">
<input id="densidad" type="number" placeholder="Densidad">
<input id="radio" type="number" placeholder="Radio">
<input id="r" type="number" placeholder="Distancia">
<input id="rmax" type="number" placeholder="r_max" value="100000000">

<select id="modo">
<option>Potencial</option>
<option>Gravedad</option>
</select>

<input id="velocidad" type="range" min="0.001" max="0.05" step="0.001" value="0.01">

<button onclick="usarTierra()">Tierra</button>
<button onclick="calcular()">Calcular</button>
<button onclick="toggleAnim()">Animar</button>
</div>

<button id="volverBtn" onclick="volverFormulario()">Volver</button>

<div class="resultado" id="resultadoBox">
Resultado aparecerá aquí
</div>

<div class="graficas-container" id="graficasContainer">

<div class="grafica-box">
<div class="titulo-grafica">Gráfica 2D</div>
<canvas id="grafica"></canvas>
</div>

<div class="divisor"></div>

<div class="grafica-box">
<div class="titulo-grafica">Visualización 3D</div>
<div id="threeContainer"></div>
</div>

</div>

<script>
const G=6.674e-11;
let chart;
let scene,camera,renderer,sphere,punto,controls;
let parametros=null;
let animando=false;
let angulo=0;

function esMovil(){
return window.innerWidth<=768;
}

function usarTierra(){
densidad.value=5515;
radio.value=6378137;
}

function masaTotal(rho,R){
return (4/3)*Math.PI*Math.pow(R,3)*rho;
}

function valorFisico(r,rho,R){
let M=masaTotal(rho,R);
if(modo.value==="Gravedad"){
if(r<=R) return (4/3)*Math.PI*G*rho*r;
return G*M/(r*r);
}else{
if(r<=R) return -(2/3)*Math.PI*G*rho*(3*R*R-r*r);
return -G*M/r;
}
}

function calcular(){

let rho=parseFloat(densidad.value);
let R=parseFloat(radio.value);
let r_val=parseFloat(r.value);
let r_max=parseFloat(rmax.value);

if(!rho||!R||!r_val||!r_max){
alert("Completa los valores");
return;
}

parametros={rho,R,r:r_val,r_max};

actualizarResultado(r_val);
generarGrafica();
crearEscena3D();

/* 🔥 SOLO EN MOVIL */
if(esMovil()){
document.querySelector(".panel").style.display="none";
graficasContainer.style.display="flex";
resultadoBox.style.display="block";
}
}

function volverFormulario(){
document.querySelector(".panel").style.display="flex";
graficasContainer.style.display="none";
resultadoBox.style.display="none";
}

function actualizarResultado(r_actual){
let {rho,R}=parametros;
let resultado=valorFisico(r_actual,rho,R);
resultadoBox.innerHTML=
(modo.value==="Gravedad"?"g(r) = ":"V(r) = ")
+resultado.toExponential(5);
}

function generarGrafica(){

let {rho,R,r,r_max}=parametros;
let datos=[],valores=[];

for(let i=0;i<=400;i++){
let x=i*(r_max)/400;
datos.push(x);
valores.push(valorFisico(x,rho,R));
}

if(chart) chart.destroy();

chart=new Chart(grafica,{
type:"line",
data:{
datasets:[
{
data:datos.map((x,i)=>({x:x,y:valores[i]})),
borderColor:"#00eaff",
borderWidth:2,
pointRadius:0
},
{
type:"scatter",
data:[{x:r,y:valorFisico(r,rho,R)}],
backgroundColor:"red",
pointRadius:6
}]
},
options:{
responsive:false,
maintainAspectRatio:false,
animation:false,
scales:{
x:{type:"linear",max:r_max},
y:{
min:Math.min(...valores),
max:Math.max(...valores)
}
},
plugins:{legend:{display:false}}
}
});
}

function crearEscena3D(){

threeContainer.innerHTML="";

scene=new THREE.Scene();

let width=threeContainer.clientWidth;
let height=threeContainer.clientHeight;

camera=new THREE.PerspectiveCamera(60,width/height,0.1,1000);
renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(width,height);
threeContainer.appendChild(renderer.domElement);

controls=new THREE.OrbitControls(camera,renderer.domElement);

let light=new THREE.PointLight(0xffffff,1.5);
light.position.set(10,10,10);
scene.add(light);

sphere=new THREE.Mesh(
new THREE.SphereGeometry(3,64,64),
new THREE.MeshPhongMaterial({color:0x0077ff})
);
scene.add(sphere);

punto=new THREE.Mesh(
new THREE.SphereGeometry(0.25,32,32),
new THREE.MeshBasicMaterial({color:0xff0000})
);
scene.add(punto);

camera.position.set(8,6,8);

function render(){
requestAnimationFrame(render);

if(animando){
let vel=parseFloat(velocidad.value);
angulo+=vel;

let {rho,R,r_max}=parametros;

let r_anim=Math.abs(Math.sin(angulo))*r_max;
let escala=6*(r_anim/r_max);

punto.position.x=escala*Math.cos(angulo);
punto.position.z=escala*Math.sin(angulo);

chart.data.datasets[1].data[0].x=r_anim;
chart.data.datasets[1].data[0].y=
valorFisico(r_anim,rho,R);
chart.update("none");

actualizarResultado(r_anim);
}

controls.update();
renderer.render(scene,camera);
}
render();
}

function toggleAnim(){
animando=!animando;
}
</script>
</body>
</html>
